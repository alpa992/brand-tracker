services:
  - type: web
    name: brand-tracker
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: OPENAI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4o-mini-search-preview
      - key: ACCESS_PASSWORD
        value: Brandtracker2026
      - key: SESSION_SECRET
        generateValue: true  # Render will auto-generate a secure value
    # To persist the SQLite database across restarts, upgrade to a paid plan
    # and uncomment the disk block below:
    # disk:
    #   name: data
    #   mountPath: /opt/render/project/src
    #   sizeGB: 1
